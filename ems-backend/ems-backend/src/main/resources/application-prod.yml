spring:
  datasource:
    url: [REDACTED_SECRET_5]
    username: ${DB_USERNAME}
    password: ${DB_[REDACTED_GENERIC_PASSWORD_2]}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: 8080
  servlet:
    session:
      timeout: 30m

logging:
  level:
    root: WARN
    com.employeesystem.emsbackend: WARN
  file:
    name: /var/log/ems-backend/application.log
    max-size: 100MB
    max-history: 90
    total-size-cap: 1GB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
