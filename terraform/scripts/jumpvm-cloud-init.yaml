#cloud-config
package_update: false
package_upgrade: false

output:
  all: "| tee -a /var/log/cloud-init-output.log"

write_files:
  - path: /usr/local/sbin/bootstrap-jumpvm.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -Eeuo pipefail

      export DEBIAN_FRONTEND=noninteractive
      export NEEDRESTART_MODE=a
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

      LOG_FILE="/var/log/cloud-init-output.log"
      KUBECTL_VERSION="${KUBECTL_VERSION:-__KUBECTL_VERSION__}"
      KUBELOGIN_VERSION="${KUBELOGIN_VERSION:-__KUBELOGIN_VERSION__}"

      exec > >(tee -a "${LOG_FILE}") 2>&1

      log() {
        echo "[$(date --iso-8601=seconds)] $*"
      }

      fail() {
        log "ERROR: $*"
        exit 1
      }

      on_error() {
        local exit_code=$?
        local line_no=$1
        log "ERROR: Jump VM bootstrap failed at line ${line_no} with exit code ${exit_code}"
        exit "${exit_code}"
      }

      retry() {
        local attempts=5
        local delay=10
        local n=1

        until "$@"; do
          if [ "${n}" -ge "${attempts}" ]; then
            log "ERROR: command failed after ${attempts} attempts: $*"
            return 1
          fi

          log "Command failed. Retrying in ${delay}s (${n}/${attempts}): $*"
          sleep "${delay}"
          n=$((n + 1))
        done
      }

      trap 'on_error $LINENO' ERR

      wait_for_apt() {
        log "Waiting for apt/dpkg locks to be released..."
        while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
              fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
              fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
          sleep 5
        done
      }

      install_base_packages() {
        log "Installing base packages..."
        wait_for_apt
        retry apt-get update -y
        retry apt-get install -y --no-install-recommends \
          apt-transport-https \
          ca-certificates \
          curl \
          gpg \
          git \
          jq \
          lsb-release \
          software-properties-common \
          unzip \
          wget
      }

      install_azure_cli() {
        log "Installing Azure CLI..."
        install -d -m 0755 /etc/apt/keyrings
        retry curl -fsSL https://packages.microsoft.com/keys/microsoft.asc -o /tmp/microsoft.asc
        gpg --dearmor < /tmp/microsoft.asc > /etc/apt/keyrings/microsoft.gpg
        chmod 0644 /etc/apt/keyrings/microsoft.gpg

        local distro
        distro="$(lsb_release -cs)"
        cat > /etc/apt/sources.list.d/azure-cli.sources <<EOF
      Types: deb
      URIs: https://packages.microsoft.com/repos/azure-cli/
      Suites: ${distro}
      Components: main
      Architectures: amd64
      Signed-By: /etc/apt/keyrings/microsoft.gpg
      EOF

        wait_for_apt
        retry apt-get update -y
        retry apt-get install -y --no-install-recommends azure-cli
      }

      install_kubectl() {
        log "Installing kubectl ${KUBECTL_VERSION}..."
        retry curl -fsSLo /tmp/kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
        retry curl -fsSLo /tmp/kubectl.sha256 "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
        echo "$(cat /tmp/kubectl.sha256)  /tmp/kubectl" | sha256sum --check
        install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
      }

      install_helm() {
        log "Installing Helm 3..."
        local expected_key_id="DDF78C3E6EBB2D2CC223C95C62BA89D07698DBC6"
        local actual_key_id

        install -d -m 0755 /etc/apt/keyrings
        retry curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey -o /tmp/helm.gpgkey
        actual_key_id="$(gpg --show-keys --with-colons /tmp/helm.gpgkey | awk -F: '$1 == "fpr" {print $10}' | head -n 1)"
        if [ "${actual_key_id}" != "${expected_key_id}" ]; then
          fail "Unexpected Helm APT key fingerprint: ${actual_key_id}"
        fi

        gpg --dearmor < /tmp/helm.gpgkey > /etc/apt/keyrings/helm.gpg
        chmod 0644 /etc/apt/keyrings/helm.gpg

        cat > /etc/apt/sources.list.d/helm-stable-debian.sources <<EOF
      Types: deb
      URIs: https://packages.buildkite.com/helm-linux/helm-debian/any/
      Suites: any
      Components: main
      Signed-By: /etc/apt/keyrings/helm.gpg
      EOF

        wait_for_apt
        retry apt-get update -y
        retry apt-get install -y --no-install-recommends helm
      }

      install_kubelogin() {
        log "Installing kubelogin ${KUBELOGIN_VERSION}..."
        retry curl -fsSLo /tmp/kubelogin.zip "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip"
        retry curl -fsSLo /tmp/kubelogin.zip.sha256 "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip.sha256"
        local expected_sha
        expected_sha="$(sed -E 's/^sha256://; s/[[:space:]].*$//' /tmp/kubelogin.zip.sha256)"
        echo "${expected_sha}  /tmp/kubelogin.zip" | sha256sum --check

        rm -rf /tmp/kubelogin
        mkdir -p /tmp/kubelogin
        unzip -q /tmp/kubelogin.zip -d /tmp/kubelogin
        install -m 0755 /tmp/kubelogin/bin/linux_amd64/kubelogin /usr/local/bin/kubelogin
      }

      configure_jumpvm_profile() {
        log "Configuring Jump VM profile and helper scripts..."
        mkdir -p /opt/deploy/logs

        cat > /etc/profile.d/aks-tools.sh <<'EOF'
      export PATH="/opt/deploy:/usr/local/bin:$PATH"
      alias k='kubectl'
      alias h='helm'
      alias kgp='kubectl get pods'
      alias kdesc='kubectl describe'
      alias klogs='kubectl logs'

      # Print a banner with login instructions on interactive shell
      if [ -n "$PS1" ]; then
        echo ""
        echo "======================================================================"
        echo "  Welcome to the AKS Jump VM"
        echo ""
        echo "  To connect to the AKS cluster, authenticate with your own identity:"
        echo "    az login --use-device-code"
        echo "    az account set --subscription <subscription-id>"
        echo "    az aks get-credentials --resource-group <rg> --name <cluster>"
        echo "    kubelogin convert-kubeconfig -l azurecli"
        echo "    kubectl get nodes"
        echo "======================================================================"
        echo ""
      fi
      EOF

        cat > /opt/deploy/aks-admin-login.sh <<'LOGINEOF'
      #!/usr/bin/env bash
      #=============================================================================
      # aks-admin-login.sh — Authenticate as an AKS Administrator (user identity)
      #
      # This script uses YOUR Microsoft Entra identity to authenticate and retrieve
      # AKS credentials. It does NOT use the Jump VM's managed identity for AKS.
      #
      # Prerequisites:
      #   - Your Microsoft Entra user must be a member of the AKS admin group.
      #   - Azure CLI, kubectl, and kubelogin are already installed.
      #
      # Usage:
      #   ./aks-admin-login.sh <resource-group> <aks-cluster-name> [subscription-id]
      #
      # Example:
      #   ./aks-admin-login.sh rg-aks-3tier-dev aks-ems-dev 6cdf4626-...-548d18
      #=============================================================================
      set -Eeuo pipefail

      RESOURCE_GROUP="${1:?Usage: aks-admin-login.sh <resource-group> <aks-cluster-name> [subscription-id]}"
      AKS_CLUSTER_NAME="${2:?Usage: aks-admin-login.sh <resource-group> <aks-cluster-name> [subscription-id]}"
      SUBSCRIPTION_ID="${3:-}"

      echo ""
      echo "============================================================"
      echo "  AKS Admin Login — User Identity Authentication"
      echo "============================================================"
      echo ""

      # If not already logged in with a user identity, perform device-code login
      if ! az account show 2>/dev/null | grep -q '"user"'; then
        echo "Step 1/4: Authenticating with Microsoft Entra ID..."
        echo "         A browser window will open for device code login."
        echo ""
        az login --use-device-code --allow-no-subscriptions
        echo ""
        echo "✅ Login successful."
      else
        echo "✅ Already authenticated to Azure."
      fi

      # Optionally set subscription
      if [ -n "${SUBSCRIPTION_ID}" ]; then
        echo ""
        echo "Step 2/4: Setting subscription to ${SUBSCRIPTION_ID}..."
        az account set --subscription "${SUBSCRIPTION_ID}"
        echo "✅ Subscription set."
      fi

      # Fetch AKS credentials (user-based authentication)
      echo ""
      echo "Step 3/4: Fetching AKS credentials for '${AKS_CLUSTER_NAME}'..."
      az aks get-credentials \
        --resource-group "${RESOURCE_GROUP}" \
        --name "${AKS_CLUSTER_NAME}" \
        --overwrite-existing
      echo "✅ AKS kubeconfig merged."

      # Convert kubeconfig to use Azure CLI token
      echo ""
      echo "Step 4/4: Converting kubeconfig for Azure CLI authentication..."
      kubelogin convert-kubeconfig -l azurecli
      echo "✅ kubeconfig converted."

      # Verify access
      echo ""
      echo "============================================================"
      echo "  Verifying cluster access..."
      echo "============================================================"
      echo ""

      kubectl cluster-info 2>/dev/null || echo ""

      echo ""
      echo "Testing node access with: kubectl get nodes"
      if kubectl get nodes 2>/dev/null; then
        echo ""
        echo "✅ SUCCESS — You are authenticated as an AKS administrator."
      else
        echo ""
        echo "⚠️  WARNING: Could not list nodes."
        echo "   Possible reasons:"
        echo "   - Your user is not a member of the AKS admin Entra group."
        echo "   - The cluster is still provisioning."
        echo "   - Network connectivity issue (private cluster)."
        echo ""
        echo "   Verify your group membership with:"
        echo "     az ad signed-in-user show --query id -o tsv"
      fi

      echo ""
      echo "============================================================"
      echo "  Commands are now available:"
      echo "    kubectl get nodes"
      echo "    kubectl get pods -A"
      echo "    kubectl get svc"
      echo "    kubectl get ingress"
      echo "============================================================"
      LOGINEOF
        chmod 0755 /opt/deploy/aks-admin-login.sh

        # Keep the original get-kubeconfig.sh for backward compatibility,
        # but now it warns about deprecation and delegates to the new script.
        cat > /opt/deploy/get-kubeconfig.sh <<'LEGACYEOF'
      #!/usr/bin/env bash
      #=============================================================================
      # [DEPRECATED] get-kubeconfig.sh
      #
      # This script is retained for backward compatibility. It now delegates to
      # the new aks-admin-login.sh which uses user-identity authentication.
      #
      # AKS has been migrated from MSI-based admin access to Microsoft Entra
      # group-based administration. Administrators should authenticate using
      # their own Entra identity rather than the VM's managed identity.
      #
      # See: /opt/deploy/aks-admin-login.sh
      #=============================================================================
      echo ""
      echo "⚠️  [DEPRECATED] get-kubeconfig.sh uses MSI-based authentication."
      echo ""
      echo "   AKS now uses Microsoft Entra group-based administration."
      echo "   Please use the new login script instead:"
      echo ""
      echo "       /opt/deploy/aks-admin-login.sh <rg> <cluster> [subscription]"
      echo ""
      echo "   This will prompt for device-code login and use YOUR identity."
      echo ""
      echo "Redirecting to aks-admin-login.sh..."
      echo ""
      exec /opt/deploy/aks-admin-login.sh "$@"
      LEGACYEOF
        chmod 0755 /opt/deploy/get-kubeconfig.sh
      }

      validate_installation() {
        log "Validating installed tools..."
        command -v az >/dev/null || fail "az was not installed"
        command -v kubectl >/dev/null || fail "kubectl was not installed"
        command -v helm >/dev/null || fail "helm was not installed"
        command -v kubelogin >/dev/null || fail "kubelogin was not installed"
        command -v jq >/dev/null || fail "jq was not installed"
        command -v unzip >/dev/null || fail "unzip was not installed"
        command -v git >/dev/null || fail "git was not installed"

        az version
        kubectl version --client
        helm version
        kubelogin --version
        jq --version
        unzip -v | head -n 2
        git --version
      }

      main() {
        log "Starting Jump VM bootstrap for private AKS administration"
        install_base_packages
        install_azure_cli
        install_kubectl
        install_helm
        install_kubelogin
        configure_jumpvm_profile
        validate_installation
        log "Jump VM bootstrap completed successfully"
      }

      main "$@"

runcmd:
  - [bash, -lc, "/usr/local/sbin/bootstrap-jumpvm.sh"]

final_message: "Jump VM initialization completed. AKS tooling bootstrap succeeded."
