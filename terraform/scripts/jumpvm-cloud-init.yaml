#cloud-config
# Jump VM Cloud-Init Script for Private AKS Deployment
# This script automatically installs all required tools and creates a deployment script

packages:
  - curl
  - wget
  - git
  - jq
  - unzip
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common

runcmd:
  # Update system packages
  - apt-get update
  - apt-get upgrade -y

  # ========================================================================
  # 1. Install Azure CLI
  # ========================================================================
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash

  # ========================================================================
  # 2. Install kubectl
  # ========================================================================
  - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
  - chmod +x kubectl
  - mv kubectl /usr/local/bin/kubectl

  # ========================================================================
  # 3. Install kubelogin (for managed identity authentication)
  # ========================================================================
  - curl -LO https://github.com/Azure/kubelogin/releases/download/v0.0.37/kubelogin-linux-amd64.zip
  - unzip -q kubelogin-linux-amd64.zip
  - chmod +x bin/linux_amd64/kubelogin
  - mv bin/linux_amd64/kubelogin /usr/local/bin/kubelogin
  - rm -rf kubelogin-linux-amd64.zip bin/

  # ========================================================================
  # 4. Install Helm v3
  # ========================================================================
  - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  # ========================================================================
  # 5. Create deployment directory structure
  # ========================================================================
  - mkdir -p /opt/deploy
  - mkdir -p /opt/deploy/logs

  # ========================================================================
  # 6. Create the deployment script
  # ========================================================================
  - cat > /opt/deploy/deploy.sh << 'DEPLOY_SCRIPT_EOF'
#!/bin/bash

#################################################################################
# Deploy Script for Private AKS Cluster via Managed Identity
#
# Usage:
#   ./deploy.sh <resource_group> <aks_cluster_name> <image_tag> <acr_login_server>
#
# Parameters:
#   - RESOURCE_GROUP: Azure resource group name
#   - AKS_CLUSTER_NAME: AKS cluster name
#   - IMAGE_TAG: Docker image tag (e.g., git commit SHA or 'latest')
#   - ACR_LOGIN_SERVER: ACR login server (e.g., myacr.azurecr.io)
#   - HELM_NAMESPACE: Kubernetes namespace for deployment (default: employee-management)
#   - HELM_RELEASE: Helm release name (default: ems)
#
#################################################################################

set -e

# =========================================================================
# Configuration
# =========================================================================
RESOURCE_GROUP="${1:-}"
AKS_CLUSTER_NAME="${2:-}"
IMAGE_TAG="${3:-latest}"
ACR_LOGIN_SERVER="${4:-}"
HELM_NAMESPACE="${HELM_NAMESPACE:-employee-management}"
HELM_RELEASE="${HELM_RELEASE:-employee-management-system}"
HELM_CHART_PATH="${HELM_CHART_PATH:-/opt/deploy/helm-chart}"

# Log file
LOG_FILE="/opt/deploy/logs/deploy-$(date +%Y%m%d-%H%M%S).log"

# =========================================================================
# Helper Functions
# =========================================================================

log() {
    echo "[$(date +'%Y-%m-%d %H:%M:%S')] $*" | tee -a "$LOG_FILE"
}

error() {
    echo "[ERROR] $*" | tee -a "$LOG_FILE" >&2
    exit 1
}

validate_inputs() {
    log "Validating inputs..."
    [[ -z "$RESOURCE_GROUP" ]] && error "RESOURCE_GROUP is required"
    [[ -z "$AKS_CLUSTER_NAME" ]] && error "AKS_CLUSTER_NAME is required"
    [[ -z "$ACR_LOGIN_SERVER" ]] && error "ACR_LOGIN_SERVER is required"
    log "✓ All required parameters provided"
}

# =========================================================================
# Authentication using Managed Identity
# =========================================================================

authenticate_with_managed_identity() {
    log "Authenticating with Managed Identity..."
    
    # Login using system-assigned managed identity (no parameters needed)
    # The managed identity is automatically available on the VM
    az login --identity 2>&1 | tee -a "$LOG_FILE" || \
        error "Failed to authenticate with managed identity"
    
    log "✓ Successfully authenticated with Managed Identity"
}

# =========================================================================
# Get AKS Cluster Credentials
# =========================================================================

get_aks_credentials() {
    log "Getting AKS cluster credentials for: $AKS_CLUSTER_NAME"
    
    # Create .kube directory if it doesn't exist
    mkdir -p ~/.kube
    
    # Get admin credentials (since we have the AKS Cluster User role)
    az aks get-credentials \
        --resource-group "$RESOURCE_GROUP" \
        --name "$AKS_CLUSTER_NAME" \
        --overwrite-existing \
        2>&1 | tee -a "$LOG_FILE" || \
        error "Failed to get AKS credentials"
    
    log "✓ AKS credentials retrieved"
}

# =========================================================================
# Convert kubeconfig with kubelogin (for Managed Identity auth)
# =========================================================================

configure_kubelogin() {
    log "Configuring kubelogin for managed identity authentication..."
    
    # Convert kubeconfig to use kubelogin exec plugin
    # This enables authentication via the system-assigned managed identity
    kubelogin convert-kubeconfig \
        -l msi 2>&1 | tee -a "$LOG_FILE" || \
        error "Failed to convert kubeconfig with kubelogin"
    
    log "✓ kubelogin configured successfully"
}

# =========================================================================
# Verify Cluster Connectivity
# =========================================================================

verify_cluster_connectivity() {
    log "Verifying connectivity to AKS cluster..."
    
    kubectl cluster-info 2>&1 | tee -a "$LOG_FILE" || \
        error "Failed to connect to AKS cluster"
    
    log "✓ Successfully connected to AKS cluster"
}

# =========================================================================
# Create Kubernetes Namespace
# =========================================================================

create_namespace() {
    log "Ensuring namespace '$HELM_NAMESPACE' exists..."
    
    kubectl create namespace "$HELM_NAMESPACE" --dry-run=client -o yaml | \
        kubectl apply -f - 2>&1 | tee -a "$LOG_FILE"
    
    log "✓ Namespace ready: $HELM_NAMESPACE"
}

# =========================================================================
# Deploy Application using Helm
# =========================================================================

deploy_with_helm() {
    log "Deploying application with Helm (Release: employee-management-system)..."
    
    # Check if Helm chart path exists
    if [[ ! -d "$HELM_CHART_PATH" ]]; then
        error "Helm chart not found at: $HELM_CHART_PATH"
    fi
    
    # Helm upgrade with install flag (create if not exists, update if exists)
    # Set image tag and ACR login server as Helm values
    helm upgrade --install employee-management-system \
        "$HELM_CHART_PATH" \
        --namespace employee-management \
        --set image.tag="$IMAGE_TAG" \
        --set image.repository="$ACR_LOGIN_SERVER/employee-management-system" \
        --set acr.loginServer="$ACR_LOGIN_SERVER" \
        --wait --atomic \
        --timeout 10m \
        2>&1 | tee -a "$LOG_FILE" || \
        error "Helm deployment failed"
    
    log "✓ Application deployed successfully"
}

# =========================================================================
# Verify Deployment
# =========================================================================

verify_deployment() {
    log "Verifying deployment..."
    
    # Wait for deployments to be ready
    kubectl rollout status deployment/ems-backend \
        -n "$HELM_NAMESPACE" \
        --timeout=5m 2>&1 | tee -a "$LOG_FILE"
    
    kubectl rollout status deployment/ems-frontend \
        -n "$HELM_NAMESPACE" \
        --timeout=5m 2>&1 | tee -a "$LOG_FILE"
    
    log "✓ Deployment verification complete"
    
    # Show deployment summary
    log "========================================="
    log "Deployment Summary:"
    log "========================================="
    kubectl get all -n "$HELM_NAMESPACE" 2>&1 | tee -a "$LOG_FILE"
}

# =========================================================================
# Main Execution Flow
# =========================================================================

main() {
    log "========================================="
    log "AKS Deployment Script Started"
    log "========================================="
    log "Configuration:"
    log "  Resource Group: $RESOURCE_GROUP"
    log "  AKS Cluster: $AKS_CLUSTER_NAME"
    log "  Image Tag: $IMAGE_TAG"
    log "  ACR Server: $ACR_LOGIN_SERVER"
    log "  Helm Namespace: $HELM_NAMESPACE"
    log "  Helm Release: $HELM_RELEASE"
    log "========================================="
    
    validate_inputs
    authenticate_with_managed_identity
    get_aks_credentials
    configure_kubelogin
    verify_cluster_connectivity
    create_namespace
    deploy_with_helm
    verify_deployment
    
    log "========================================="
    log "✓ Deployment completed successfully!"
    log "========================================="
}

# Execute main function and capture exit code
main
EXIT_CODE=$?

log "Script execution completed with exit code: $EXIT_CODE"
exit $EXIT_CODE

DEPLOY_SCRIPT_EOF

  # Make deploy script executable
  - chmod +x /opt/deploy/deploy.sh
  - chown root:root /opt/deploy/deploy.sh

  # ========================================================================
  # 7. Create systemd service file for easy deployment invocation
  # ========================================================================
  - cat > /etc/systemd/system/aks-deploy.service << 'SYSTEMD_EOF'
[Unit]
Description=AKS Deployment Service
After=network.target

[Service]
Type=oneshot
ExecStart=/opt/deploy/deploy.sh
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
SYSTEMD_EOF

  # ========================================================================
  # 8. Create bashrc profile for convenient CLI usage
  # ========================================================================
  - cat >> /etc/profile.d/aks-tools.sh << 'PROFILE_EOF'
# AKS Deployment Tools Profile
export PATH="/opt/deploy:$PATH"
export KUBECONFIG="$HOME/.kube/config"

# Helpful aliases
alias k='kubectl'
alias h='helm'
alias kdesc='kubectl describe'
alias klogs='kubectl logs'
alias kgp='kubectl get pods'
PROFILE_EOF

  # ========================================================================
  # 9. Configure Azure CLI for managed identity authentication
  # ========================================================================
  - cat > /root/.azure/az-env.sh << 'AZENV_EOF'
#!/bin/bash
# Auto-login using managed identity on SSH or shell startup
az login --identity 2>/dev/null || true
AZENV_EOF

  - chmod +x /root/.azure/az-env.sh

  # ========================================================================
  # 10. Create helper scripts for common operations
  # ========================================================================
  - cat > /opt/deploy/get-kubeconfig.sh << 'KUBECONFIG_EOF'
#!/bin/bash
# Helper script to refresh kubeconfig
az aks get-credentials \
    --resource-group "${RESOURCE_GROUP}" \
    --name "${AKS_CLUSTER_NAME}" \
    --overwrite-existing
kubelogin convert-kubeconfig -l msi
KUBECONFIG_EOF

  - chmod +x /opt/deploy/get-kubeconfig.sh

  # ========================================================================
  # 11. Verify installations
  # ========================================================================
  - echo "Verifying installed tools..."
  - az --version
  - kubectl version --client
  - kubelogin --version
  - helm version
  - jq --version

  # ========================================================================
  # 12. Final message
  # ========================================================================
  - echo "========================================="
  - echo "Jump VM Setup Complete!"
  - echo "========================================="
  - echo "Deployed tools:"
  - echo "  ✓ Azure CLI"
  - echo "  ✓ kubectl"
  - echo "  ✓ kubelogin"
  - echo "  ✓ Helm v3"
  - echo "  ✓ jq, unzip"
  - echo ""
  - echo "Deployment script available at:"
  - echo "  /opt/deploy/deploy.sh"
  - echo ""
  - echo "Managed Identity enabled for passwordless authentication"
  - echo "========================================="

final_message: "Jump VM initialization completed. System ready for AKS deployment via Managed Identity."
