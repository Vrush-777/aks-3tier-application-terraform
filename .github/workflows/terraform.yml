name: Terraform Infrastructure Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

env:
  TF_VERSION: 1.14.9 # Latest stable version as of June 2024

jobs:
  terraform-validation:
    name: Terraform Validate & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/environments/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: |
          terraform fmt -check -recursive ..
        continue-on-error: true

      - name: Clean Terraform Cache
        run: |
          rm -rf ~/.terraform.d
          rm -rf .terraform

      - name: Terraform Init
        id: init
        run: |
          terraform init -upgrade

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: TFLint Check
        continue-on-error: true
        run: |
          curl https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --init
          tflint

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format 🖼️\`${{ steps.fmt.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Init 🔨\`${{ steps.init.outcome }}\`
            
            <details><summary>Validation Details</summary>
            
            \`\`\`
            ${{ steps.validate.outputs.stdout }}
            \`\`\`
            
            </details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validation
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./terraform/environments/dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Clean Terraform Cache
        run: |
          rm -rf ~/.terraform.d
          rm -rf .terraform

      - name: Terraform Init
        run: |
          terraform init -upgrade


      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Save Plan
        run: terraform show -json tfplan > tfplan.json

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            ./terraform/environments/dev/tfplan
            ./terraform/environments/dev/tfplan.json

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const planOutput = `${{ steps.plan.outputs.stdout }}`;
            const output = `#### Terraform Plan 📋
            \`\`\`
            ${planOutput.substring(0, 10000)}${planOutput.length > 10000 ? '... (truncated)' : ''}
            \`\`\`
            
            Plan saved as artifact for review.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./terraform/environments/dev

    environment:
      name: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Clean Terraform Cache
        run: |
          rm -rf ~/.terraform.d
          rm -rf .terraform

      - name: Terraform Init
        run: |
          terraform init -upgrade


      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color

      - name: Terraform Apply
        id: apply
        run: |
          terraform apply -auto-approve -no-color
          terraform output -json > outputs.json

      - name: Capture Outputs
        run: |
          echo "aks_cluster_name=$(terraform output -raw aks_cluster_name)" >> $GITHUB_ENV
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> $GITHUB_ENV
          echo "resource_group=$(terraform output -raw resource_group_name)" >> $GITHUB_ENV

      - name: Upload Terraform State
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-state-${{ github.run_id }}
          path: ./terraform/environments/dev/

      - name: Slack Notification - Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Terraform Apply Succeeded",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Terraform Infrastructure Updated* ✅\n*Ref:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }

      - name: Slack Notification - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Terraform Apply Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Terraform Apply Failed* ❌\n*Ref:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}\n*Logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
