name: Build and Deploy to AKS

on:
  workflow_run:
    workflows:
      - Terraform Infrastructure Pipeline
    types:
      - completed

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  HELM_CHART_PATH: ./helm/employee-management-system
  DEPLOYMENT_NAMESPACE: employee-management
  DOCKER_BUILDKIT: 1

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend-changed: ${{ steps.changes.outputs.backend }}
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      helm-changed: ${{ steps.changes.outputs.helm }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            backend:
              - 'ems-backend/**'
            frontend:
              - 'ems-fullstack/**'
            helm:
              - 'helm/**'

  build-backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend-changed == 'true' || github.event_name == 'push'
    defaults:
      run:
        working-directory: ./ems-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven Tests
        id: tests
        run: mvn clean test -DskipIntegrationTests -q
        continue-on-error: true

      - name: Build with Maven
        if: steps.tests.outcome == 'success'
        run: mvn clean package -DskipTests -q

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: 'ems-backend/target/surefire-reports/**/*.xml'

      - name: Azure Login
        if: github.event_name == 'push'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v4
        with:
          context: ./ems-backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/ems-backend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/ems-backend:latest
            ${{ env.ACR_LOGIN_SERVER }}/ems-backend:${{ github.ref_name }}
          
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Slack Notification - Backend Success
        if: success() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Backend Build Succeeded",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Backend Docker Image Built* ✅\n*Image:* ${{ env.ACR_LOGIN_SERVER }}/ems-backend:${{ github.sha }}\n*Ref:* ${{ github.ref }}"
                  }
                }
              ]
            }

  build-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend-changed == 'true' || github.event_name == 'push'
    defaults:
      run:
        working-directory: ./ems-fullstack

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'ems-fullstack/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      # - name: Run Tests
      #   id: tests
      #   run: npm test -- --coverage --watchAll=false
      #   continue-on-error: true

      - name: Build Application
        run: npm run build

      - name: Azure Login
        if: github.event_name == 'push'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # - name: Get ACR Credentials
      #   if: github.event_name == 'push'
      #   run: |
      #     echo "REGISTRY_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} -g ${{ env.RESOURCE_GROUP }} --query passwords[0].value -o tsv)" >> $GITHUB_ENV

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v4
        with:
          context: ./ems-fullstack
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/ems-frontend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/ems-frontend:latest
            ${{ env.ACR_LOGIN_SERVER }}/ems-frontend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Slack Notification - Frontend Success
        if: success() && github.event_name == 'push'
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Frontend Build Succeeded",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Frontend Docker Image Built* ✅\n*Image:* ${{ env.ACR_LOGIN_SERVER }}/ems-frontend:${{ github.sha }}\n*Ref:* ${{ github.ref }}"
                  }
                }
              ]
            }

  deploy:
    name: Deploy to AKS via Helm
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Add Helm Repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Create Namespace
        run: |
          kubectl create namespace ${{ env.DEPLOYMENT_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm Dry-Run
        id: helm-dry-run
        run: |
          helm upgrade --install employee-management-system \
            ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.DEPLOYMENT_NAMESPACE }} \
            --values ${{ env.HELM_CHART_PATH }}/values.yaml \
            --values ${{ env.HELM_CHART_PATH }}/values-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}.yaml \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set registry.name=${{ env.ACR_LOGIN_SERVER }} \
            --dry-run \
            --debug

      - name: Helm Upgrade/Install
        id: helm-deploy
        run: |
          helm upgrade --install employee-management-system \
            ${{ env.HELM_CHART_PATH }} \
            --namespace ${{ env.DEPLOYMENT_NAMESPACE }} \
            --values ${{ env.HELM_CHART_PATH }}/values.yaml \
            --values ${{ env.HELM_CHART_PATH }}/values-${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}.yaml \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set registry.name=${{ env.ACR_LOGIN_SERVER }} \
            --wait \
            --timeout 10m \
            --atomic

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/ems-backend \
            -n ${{ env.DEPLOYMENT_NAMESPACE }} \
            --timeout=5m
          kubectl rollout status deployment/ems-frontend \
            -n ${{ env.DEPLOYMENT_NAMESPACE }} \
            --timeout=5m

      - name: Get Deployment Info
        if: always()
        run: |
          echo "=== Deployment Status ===" 
          kubectl get deployments -n ${{ env.DEPLOYMENT_NAMESPACE }}
          echo "=== Pods Status ===" 
          kubectl get pods -n ${{ env.DEPLOYMENT_NAMESPACE }}
          echo "=== Services ===" 
          kubectl get svc -n ${{ env.DEPLOYMENT_NAMESPACE }}

      - name: Run Smoke Tests
        continue-on-error: true
        run: |
          BACKEND_POD=$(kubectl get pods -n ${{ env.DEPLOYMENT_NAMESPACE }} -l app.kubernetes.io/component=backend -o jsonpath='{.items[0].metadata.name}')
          FRONTEND_POD=$(kubectl get pods -n ${{ env.DEPLOYMENT_NAMESPACE }} -l app.kubernetes.io/component=frontend -o jsonpath='{.items[0].metadata.name}')
          
          echo "Testing Backend..."
          kubectl exec -n ${{ env.DEPLOYMENT_NAMESPACE }} $BACKEND_POD -- curl -f http://localhost:8080/actuator/health || true
          
          echo "Testing Frontend..."
          kubectl exec -n ${{ env.DEPLOYMENT_NAMESPACE }} $FRONTEND_POD -- curl -f http://localhost:80/ || true

      - name: Create Rollback Secret
        run: |
          kubectl create configmap deployment-record-${{ github.run_id }} \
            --from-literal=commit=${{ github.sha }} \
            --from-literal=branch=${{ github.ref_name }} \
            --from-literal=timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --from-literal=helm-revision=$(helm history employee-management-system -n ${{ env.DEPLOYMENT_NAMESPACE }} | tail -1 | awk '{print $1}') \
            -n ${{ env.DEPLOYMENT_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Slack Notification - Deployment Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Deployment to AKS Succeeded",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Application Deployed to AKS* ✅\n*Environment:* ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}\n*Cluster:* ${{ env.AKS_CLUSTER_NAME }}\n*Namespace:* ${{ env.DEPLOYMENT_NAMESPACE }}\n*Commit:* ${{ github.sha }}\n*Ref:* ${{ github.ref_name }}"
                  }
                }
              ]
            }

      - name: Slack Notification - Deployment Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Deployment to AKS Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed* ❌\n*Environment:* ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}\n*Cluster:* ${{ env.AKS_CLUSTER_NAME }}\n*Logs:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      - name: Store Deployment Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: deployment-logs-${{ github.run_id }}
          path: |
            helm-values.yaml
            k8s-manifests/
