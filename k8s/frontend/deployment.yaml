---
# ============================================================================
# Frontend Deployment - React/Nginx
# ============================================================================
# Purpose: Deploy React frontend served by Nginx with rolling updates
# 
# Features:
#   - Multi-replica deployment for HA
#   - Rolling updates for zero downtime
#   - Resource requests and limits
#   - Readiness and liveness probes
#   - Pod disruption budget for safety
#   - Anti-affinity for spread across nodes
#
# Apply: kubectl apply -f k8s/frontend/deployment.yaml -n dev
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ems-frontend
  namespace: dev
  labels:
    app: ems-frontend
    version: v1
    component: frontend
    managed-by: terraform
  annotations:
    description: "React frontend served by Nginx"

spec:
  # Number of replicas for HA
  replicas: 2
  
  # Rolling update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1              # Max 1 extra pod during update
      maxUnavailable: 0        # Ensure zero downtime
  
  # Pod selector
  selector:
    matchLabels:
      app: ems-frontend
  
  # Pod template specification
  template:
    metadata:
      name: ems-frontend-pod
      labels:
        app: ems-frontend
        version: v1
        component: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/health"
    
    spec:
      # Pod affinity for node spread
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - ems-frontend
                topologyKey: kubernetes.io/hostname
      
      # Security context at pod level
      securityContext:
        fsGroup: 33  # nginx group
        runAsNonRoot: true
      
      # Service account
      serviceAccountName: ems-frontend
      
      # Containers specification
      containers:
        - name: nginx
          image: ems-frontend:latest  # Replace with registry URL
          imagePullPolicy: Always
          
          # Ports
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          
          # Container security context
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 33  # nginx user
          
          # Resource requests and limits
          resources:
            requests:
              cpu: 100m           # Minimum CPU
              memory: 128Mi       # Minimum memory
            limits:
              cpu: 500m           # Maximum CPU
              memory: 256Mi       # Maximum memory
          
          # Readiness probe (when to accept traffic)
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5     # Wait before first check
            periodSeconds: 10          # Check every 10s
            timeoutSeconds: 3          # Wait 3s for response
            successThreshold: 1        # 1 success = ready
            failureThreshold: 3        # 3 failures = not ready
          
          # Liveness probe (when to restart)
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15    # Wait before first check
            periodSeconds: 20          # Check every 20s
            timeoutSeconds: 3          # Wait 3s for response
            failureThreshold: 3        # 3 failures = restart
          
          # Volume mounts (read-only filesystem)
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
          
          # Environment variables
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOG_LEVEL
              value: "info"
      
      # Volumes for writable directories
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
      
      # Termination grace period
      terminationGracePeriodSeconds: 30

---
# ============================================================================
# Pod Disruption Budget - Ensure availability during cluster upgrades
# ============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ems-frontend-pdb
  namespace: dev
  labels:
    app: ems-frontend
spec:
  minAvailable: 1              # At least 1 pod must be running
  selector:
    matchLabels:
      app: ems-frontend
