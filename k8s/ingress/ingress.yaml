---
# [REDACTED_AWS_SECRET_KEY_CREDENTIALS_1]====================================
# Optional: Azure Application Gateway Settings
# [REDACTED_AWS_SECRET_KEY_CREDENTIALS_1]====================================
# Store in Application Gateway config:
#
# Backend HTTP Settings:
#   - Port: 80/8080
#   - Protocol: HTTP
#   - Cookie-based affinity: Disabled (unless stateful)
#   - Connection timeout: 30 seconds
#   - Request timeout: 60 seconds
#   - Pick host name from backend address: No
#   - Custom probe: /health (optional)
#
# Frontend IP Configuration:
#   - Public IP: Required for external access
#   - Private IP: For internal access only
#
# HTTP Listeners:
#   - Protocol: HTTP (add HTTPS with certificate)
#   - Port: 80 (add 443 for HTTPS)
#   - Host name: Specify or leave empty for all
#
# Routing Rules:
#   - Priority: Ensure correct order
#   - Path-based routing: /api/* to backend
#   - Default routing: / to frontend

---
# [REDACTED_AWS_SECRET_KEY_CREDENTIALS_1]====================================
# AGIC Deployment - Verify Installation
# [REDACTED_AWS_SECRET_KEY_CREDENTIALS_1]====================================
# Check AGIC controller is running:
#   kubectl get pods -n kube-system | grep ingress-azure
#
# View AGIC logs:
#   kubectl logs -n kube-system -l app=ingress-azure -f
#
# Verify Ingress is recognized:
#   kubectl get ingress -n dev
#   kubectl describe ingress ems-ingress -n dev
#
# Check Application Gateway status:
#   az network application-gateway show \
#     --name <appgw-name> \
#     --resource-group <rg-name>

