---
# [REDACTED_AWS_SECRET_KEY_CREDENTIALS_1]====================================
# Backend Secret - Sensitive configuration
# [REDACTED_AWS_SECRET_KEY_CREDENTIALS_1]====================================
# Purpose: Store sensitive credentials (database password, API keys, etc.)
# 
# ⚠️ SECURITY WARNING:
# - This is for demonstration purposes
# - In production, use Azure Key Vault with Workload Identity
# - DO NOT commit this file with real secrets to git
# - Use git-crypt or sealed-secrets for encrypted storage
# - Use Azure Key Vault provider or External Secrets Operator (ESO)
# 
# Usage in deployment:
#   envFrom:
#     - secretRef:
#         name: ems-backend-secrets
#
# Create from file:
#   kubectl create secret generic ems-backend-secrets \
#     --from-literal=DB_PASSWORD='secure_password' \
#     -n dev
#
# Update:
#   kubectl delete secret ems-backend-secrets -n dev
#   kubectl create secret generic ems-backend-secrets \
#     --from-literal=DB_PASSWORD='new_password' \
#     -n dev
#
# [REDACTED_AWS_SECRET_KEY_CREDENTIALS_1]====================================

apiVersion: v1
kind: Secret
metadata:
  name: ems-backend-secrets
  namespace: dev
  labels:
    app: ems-backend
    component: backend
    managed-by: terraform
  annotations:
    description: "Sensitive credentials for backend service"
    warning: "DO NOT commit real secrets to git"

# Type of secret
type: Opaque

# Data encoded in base64 (use stringData for plain text during creation)
data:
  # Base64 encoded password - CHANGE IN PRODUCTION!
  # Default: "postgres" encoded
  # To generate: echo -n 'your-secure-password' | base64
  DB_[REDACTED_GENERIC_PASSWORD_1]: cG9zdGdyZXM=  # Base64: postgres

# For Kubernetes 1.18+, use stringData instead (will be stored as data)
# stringData:
#   DB_[REDACTED_GENERIC_PASSWORD_1]: "your-actual-password"

---
# [REDACTED_AWS_SECRET_KEY_CREDENTIALS_1]====================================
# Production: Use Azure Key Vault with Workload Identity
# [REDACTED_AWS_SECRET_KEY_CREDENTIALS_1]====================================
# 
# Reference: https://azure.github.io/aad-pod-identity/
# 
# Alternative 1: Azure Key Vault Provider for Secrets Store CSI Driver
