---
# ============================================================================
# Kubernetes Namespace - dev
# ============================================================================
# Purpose: Logical isolation for development environment
# Features:
#   - Resource quotas (optional, add if needed)
#   - Network policies (optional, add if needed)
#   - Labels for organization
# 
# Apply: kubectl apply -f k8s/namespace/namespace.yaml
# ============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    name: dev
    environment: development
    managed-by: terraform
  annotations:
    description: "Development environment namespace for EMS application"
    purpose: "Logical isolation for dev workloads"
    
# ============================================================================
# Optional: ResourceQuota for namespace (uncomment to enforce limits)
# ============================================================================
