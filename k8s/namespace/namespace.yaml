#   namespace: dev
# spec:
#   hard:
#     requests.cpu: "10"
#     requests.memory: "20Gi"
#     limits.cpu: "20"
#     limits.memory: "40Gi"
#     pods: "100"
#     services: "50"
#     persistentvolumeclaims: "10"

