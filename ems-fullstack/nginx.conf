upstream backend {
    server ems-backend:8080;
}

# Server configuration for React SPA with backend proxy
server {
    listen 8080;
    server_name _;

    # Client connection settings
    client_max_body_size 20M;
    
    # Gzip compression for smaller payload sizes
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Root location - serve React app
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        
        # Cache control for index.html (no cache)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires 0;
        }
        
        # Cache control for static assets (1 year)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            expires 365d;
        }
    }

    # Proxy API requests to backend service
    location /api/ {
        proxy_pass http://backend/;
        
        # Proxy headers for backend to know original request
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
