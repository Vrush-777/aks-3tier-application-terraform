{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "employee-management-system.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "employee-management-system.labels" . | nindent 4 }}
type: Opaque
data:
  postgres-password: {{ .Values.postgresql.auth.password | b64enc | quote }}
  postgres-username: {{ .Values.postgresql.auth.username | b64enc | quote }}
{{- end }}
